spring.application.name=critical-resource-api
springdoc.info.version=@project.version@

# Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/critical_resource_db}
spring.datasource.username=${DB_USERNAME:critical_user}
spring.datasource.password=${DB_PASSWORD:critical_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Liquibase
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

# JWT
jwt.secret=${JWT_SECRET:criticalresourceapisecretkey1234567890abcdef}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Admin par dÈfaut
app.admin.username=${ADMIN_USERNAME:admin}
app.admin.email=${ADMIN_EMAIL:admin@criticalresource.com}
app.admin.password=${ADMIN_PASSWORD:admin123}