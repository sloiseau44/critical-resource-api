spring.application.name=critical-resource-api
springdoc.info.version=@project.version@

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/critical_resource_db
spring.datasource.username=critical_user
spring.datasource.password=critical_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Liquibase
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

jwt.secret=criticalresourceapisecretkey1234567890abcdef
jwt.expiration=86400000

app.admin.username=admin
app.admin.email=admin@criticalresource.com
app.admin.password=admin123