services:
  postgres:
    image: postgres:16
    container_name: critical-resource-db
    environment:
      POSTGRES_DB: critical_resource_db
      POSTGRES_USER: critical_user
      POSTGRES_PASSWORD: critical_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U critical_user -d critical_resource_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: critical-resource-app
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/critical_resource_db
      DB_USERNAME: critical_user
      DB_PASSWORD: critical_pass
      JWT_SECRET: criticalresourceapisecretkey1234567890abcdef
      ADMIN_USERNAME: admin
      ADMIN_EMAIL: admin@criticalresource.com
      ADMIN_PASSWORD: admin123
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: